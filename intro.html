<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepTheStyle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/intro.css?v=1.2.0">
</head>
<body>
    <main id="kts-intro" class="kts-intro" aria-label="KeepTheStyle introduction" aria-live="polite">
        <div class="intro-ambient" aria-hidden="true">
            <span class="intro-orb intro-orb-one"></span>
            <span class="intro-orb intro-orb-two"></span>
            <span class="intro-grid"></span>
            <span class="intro-grain"></span>
        </div>
        <div class="intro-film" aria-hidden="true">
            <svg class="intro-mark" viewBox="0 0 160 160" role="presentation">
                <defs>
                    <linearGradient id="intro-gradient" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#9cecff"/>
                        <stop offset=".45" stop-color="#7c8cff"/>
                        <stop offset="1" stop-color="#d278ff"/>
                    </linearGradient>
                </defs>
                <path class="intro-mark-ring" d="M80 12a68 68 0 1 1 0 136 68 68 0 0 1 0-136Z"/>
                <path class="intro-mark-k" d="M52 42v76M54 82l51-40M55 82l54 37"/>
            </svg>
            <div class="intro-frames">
                <span class="intro-frame frame-one"></span>
                <span class="intro-frame frame-two"></span>
                <span class="intro-frame frame-three"></span>
            </div>
        </div>
        <div class="intro-copy">
            <p class="intro-kicker">Visual creation, reimagined</p>
            <h1><span>Keep</span><span>TheStyle</span></h1>
            <p class="intro-tagline">AI Is Not More Powerful Than You.</p>
        </div>
        <div class="intro-loader" role="status">
            <div class="intro-loader-meta"><span class="intro-status">Preparing your canvas</span><output class="intro-percent">0%</output></div>
            <div class="intro-progress"><span></span></div>
        </div>
        <div class="intro-actions">
            <button class="intro-start" type="button">Get Started <span aria-hidden="true">&#8594;</span></button>
        </div>
        <button class="intro-skip" type="button" aria-label="Skip introduction">Skip intro <span aria-hidden="true">&#8599;</span></button>
    </main>
    <script src="js/intro.js?v=1.1.0"></script>
</body>
</html>
